<div class="doc-page">
  <div class="top-bar">
    <button class="upload-btn" (click)="openModal()">Upload Document</button>
  </div>

  <table class="doc-table">
    <thead>
      <tr>
        <!-- <th>Document ID</th> -->
        <th>Document Name</th>
        <th>Category</th>
        <th>Type</th>
        <th>Date</th>
        <th>Approved By</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let doc of documents">
        <!-- <td>{{ doc.id }}</td> -->
        <td>{{ doc.name }}</td>
        <td>{{ doc.category }}</td>
        <td>{{ doc.type }}</td>
        <td>{{ doc.created_at }}</td>
        <td>{{ doc.approved_by }}</td>

        <td [ngClass]="doc.status.toLowerCase()">
          {{ doc.status }}
        </td>

        <td>
          <button class="delete-btn" (click)="openDeleteConfirm(doc.id)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<div class="overlay" *ngIf="showModal" (click)="closeModal()"></div>

<div class="modal" *ngIf="showModal">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <ion-icon name="close-outline" class="close-icon" (click)="closeModal()"></ion-icon>

    <h2>Upload Document</h2>

    <!-- TYPE -->
    <div class="form-group">
      <label class="dropdown-label">Select the Type</label>
      <select [(ngModel)]="selectedType" class="dropdown">
        <option value="" disabled>Select which template is suitable</option>
        <option value="pdf">PDF</option>
        <option value="png">PNG</option>
      </select>
    </div>

    <!-- FILE UPLOAD (LIKE DROPDOWN) -->
    <div class="form-group">
      <label class="dropdown-label">Upload File</label>

      <label class="file-upload">
        <input type="file" multiple (change)="onFileSelect($event)" hidden />
        <span>Select file</span>
        <ion-icon name="cloud-upload-outline"></ion-icon>
      </label>
    </div>

    <!-- FILE LIST -->
    <div class="file-preview" *ngIf="uploadedFiles.length > 0">
      <div class="file-item" *ngFor="let file of uploadedFiles; let i = index">
        <ion-icon name="document-outline"></ion-icon>

        <span class="file-name"> {{ file.fileName }} ({{ file.fileSize }}) </span>

        <!--  REMOVE FILE -->
        <ion-icon name="close-circle" class="remove-icon" (click)="removeFile(i)"> </ion-icon>
      </div>
    </div>

    <p class="error-msg" *ngIf="uploadError">
      {{ uploadError }}
    </p>

    <button class="upload-submit" (click)="uploadDocuments()" [disabled]="isUploading">
      {{ isUploading ? 'Uploading...' : 'Upload' }}
    </button>

    <p class="supported">Supported Files: PDF, PNG</p>
  </div>
</div>

<app-delete-confirmation
  [visible]="showDeleteConfirm"
  [message]="'Are you sure you want to delete this document?'"
  [errorMessage]="deleteErrorMessage"
  [isDeleting]="isDeleting"
  (confirm)="confirmDelete()"
  (cancel)="cancelDelete()"
>
</app-delete-confirmation>
