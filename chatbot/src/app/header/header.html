<header class="header">
  <div class="container">
    <!-- LEFT -->
    <div class="left">
      <img src="assets/chatbot.png" class="logo-icon" />
      <div class="title">
        <h2>Proclink Chatbot</h2>
        <span class="subtitle">Smart Assistant</span>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <button *ngIf="auth.isAuthenticated()" class="logout-btn" (click)="logout()">
        <img src="assets/logout.png" class="logout-icon" />
        <span>Logout</span>
      </button>
    </div>
  </div>
</header>
