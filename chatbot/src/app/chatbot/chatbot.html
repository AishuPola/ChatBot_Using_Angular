<div class="chat-layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="menu-section">
      <div class="menu-item" (click)="startNewChat()">
        <ion-icon name="create-outline"></ion-icon>
        <span>New chat</span>
      </div>

      <div class="menu-item">
        <ion-icon name="search-outline"></ion-icon>
        <span>Search chats</span>
      </div>

      <div class="menu-item">
        <ion-icon name="grid-outline"></ion-icon>
        <span>Apps</span>
      </div>

      <div class="menu-item">
        <ion-icon name="code-slash-outline"></ion-icon>
        <span>Codex</span>
      </div>

      <div class="menu-item">
        <ion-icon name="cube-outline"></ion-icon>
        <span>GPTs</span>
      </div>

      <div class="menu-item">
        <ion-icon name="folder-outline"></ion-icon>
        <span>Projects</span>
      </div>
    </div>

    <div class="chat-list">
      <div class="title">Your chats</div>

      <div class="chat-item">
        <ion-icon name="chatbubble-outline"></ion-icon>
        <span>Environmental Awareness</span>
      </div>

      <div class="chat-item">
        <ion-icon name="chatbubble-outline"></ion-icon>
        <span>Mental Health Matters</span>
      </div>

      <div class="chat-item">
        <ion-icon name="chatbubble-outline"></ion-icon>
        <span>Urban Living Insights</span>
      </div>

      <div class="chat-item">
        <ion-icon name="chatbubble-outline"></ion-icon>
        <span>Social Issues Today</span>
      </div>
    </div>

    <div class="profile">
      <div class="avatar">AP</div>
      <div>
        <div class="name">aishwarya pola</div>
      </div>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" [ngClass]="{ 'before-chat': showCenter, 'after-chat': !showCenter }">
    <!-- CENTER SCREEN -->
    <div class="center-screen" *ngIf="showCenter">
      <h2>Hey, aishwarya. Ready to dive in?</h2>
    </div>

    <!-- MESSAGES -->
    <div class="messages" *ngIf="!showCenter" #chatContainer>
      <div *ngFor="let msg of messages" class="message" [ngClass]="msg.type">
        <div class="message-content">
          <div class="actions" *ngIf="msg.type === 'bot'">
            <!--  BOT ACTIONS -->
            <button type="button" class="action-icon" (click)="speak(msg.text)" title="Speak">
              <ion-icon name="volume-high-outline"></ion-icon>
            </button>
            <button type="button" class="action-icon" (click)="copyText(msg)" title="Copy">
              <ion-icon [name]="msg.copied ? 'checkmark-outline' : 'copy-outline'"></ion-icon>
            </button>
          </div>
          <span>{{ msg.text }}</span>
        </div>
      </div>
    </div>

    <!-- INPUT BOX (ALWAYS OUTSIDE messages) -->
    <div class="input-box">
      <div class="input-wrapper">
        <!-- 📁 Upload -->
        <button type="button" class="icon-btn" (click)="fileInput.click()">
          <ion-icon name="cloud-upload-outline"></ion-icon>
        </button>

        <input type="file" #fileInput (change)="onFileSelected($event)" hidden />

        <!-- ⌨️ Input -->
        <input
          class="giving-input"
          [(ngModel)]="userInput"
          [placeholder]="isListening ? 'Listening...' : 'Ask anything'"
        />

        <!-- 🎤 Mic -->
        <button
          type="button"
          class="icon-btn mic-btn"
          [class.listening]="isListening"
          (click)="toggleMic()"
        >
          <ion-icon name="mic-outline"></ion-icon>
        </button>

        <!-- ➤ Send -->
        <button type="button" class="send" (click)="sendMessage()">
          <ion-icon name="enter-outline"></ion-icon>
        </button>
      </div>
    </div>
  </div>
</div>
