<div class="chat-layout">
  <div class="sidebar">chat sessions</div>

  <div class="chat-area">
    <!-- Messages -->
    <div class="messages">
      <!-- Center UI -->
      <div class="center-screen" *ngIf="showCenter">
        <div class="center-card">
          <h2>How can I help you today?</h2>
        </div>
      </div>

      <!-- Chat Messages -->
      <div *ngFor="let msg of messages" class="message" [ngClass]="msg.type">
        {{ msg.text }}
      </div>
    </div>

    <!-- Input -->
    <div class="input-box">
      <div class="input-wrapper">
        <!-- + icon -->
        <button class="icon-btn">+</button>

        <input
          type="text"
          [(ngModel)]="userInput"
          (keyup.enter)="sendMessage()"
          placeholder="Ask anything..."
        />

        <!-- mic -->
        <button class="icon-btn">
          <ion-icon name="mic-outline"></ion-icon>
        </button>

        <!-- send -->
        <button class="send" (click)="sendMessage()">↵</button>
      </div>
    </div>
  </div>
</div>
