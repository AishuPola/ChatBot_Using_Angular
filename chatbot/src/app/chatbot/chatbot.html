<div class="chat-layout">
  <div class="sidebar">
    <div class="menu-section">
      <div class="menu-item" (click)="startNewChat()">
        <ion-icon name="create-outline"></ion-icon>
        <span>New chat</span>
      </div>
      <div class="menu-item">
        <ion-icon name="search-outline"></ion-icon>
        <span>Search chats</span>
      </div>
      <div class="menu-item">
        <ion-icon name="grid-outline"></ion-icon>
        <span>Apps</span>
      </div>
      <div class="menu-item">
        <ion-icon name="code-slash-outline"></ion-icon>
        <span>Codex</span>
      </div>
      <div class="menu-item"><ion-icon name="cube-outline"></ion-icon> <span>GPTs</span></div>
      <div class="menu-item"><ion-icon name="folder-outline"></ion-icon> <span>Projects</span></div>
    </div>

    <div class="chat-list">
      <div class="title">Your chats</div>

      <div class="chat-item">
        <ion-icon name="chatbubble-outline"></ion-icon> <span>Environmental Awareness</span>
      </div>
      <div class="chat-item">
        <ion-icon name="chatbubble-outline"></ion-icon> <span>Mental Health Matters</span>
      </div>
      <div class="chat-item">
        <ion-icon name="chatbubble-outline"></ion-icon> <span>Urban Living Insights</span>
      </div>
      <div class="chat-item">
        <ion-icon name="chatbubble-outline"></ion-icon>
        <span>Social Issues Today</span>
      </div>
    </div>

    <div class="profile">
      <div class="avatar">AP</div>
      <div>
        <div class="name">aishwarya pola</div>
        <!-- <div class="plan">Go</div> -->
      </div>
    </div>
  </div>

  <div class="chat-area" [ngClass]="{ 'before-chat': showCenter, 'after-chat': !showCenter }">
    <div class="center-screen" *ngIf="showCenter">
      <h2>Hey, aishwarya. Ready to dive in?</h2>
    </div>

    <div class="messages" *ngIf="!showCenter" #chatContainer>
      <div *ngFor="let msg of messages" class="message" [ngClass]="msg.type">
        {{ msg.text }}
      </div>
    </div>

    <div class="input-box">
      <div class="input-wrapper">
        <button class="icon-btn" (click)="fileInput.click()">
          <ion-icon name="cloud-upload-outline"></ion-icon>
        </button>
        <!-- hidden file input -->
        <input type="file" #fileInput (change)="onFileSelected($event)" hidden />

        <!-- <input
          class="giving-input"
          [(ngModel)]="userInput"
          (keyup.enter)="sendMessage()"
          [placeholder]="isListening ? 'Listening...' : 'Ask anything'"
        /> -->
        <input
          class="giving-input"
          [(ngModel)]="userInput"
          [placeholder]="isListening ? 'Listening...' : 'Ask anything'"
        />

        <button class="icon-btn mic-btn" [class.listening]="isListening" (click)="toggleMic()">
          <ion-icon name="mic-outline"></ion-icon>
        </button>

        <button class="send" (click)="sendMessage()">
          <ion-icon name="enter-outline"></ion-icon>
        </button>
      </div>
    </div>
  </div>
</div>
