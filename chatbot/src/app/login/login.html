<div class="login-container">
  <!-- LEFT -->
  <div class="left">
    <div class="login-card">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <!-- EMAIL -->
        <div class="input-group">
          <input type="email" placeholder="Email address" formControlName="email" />

          <small *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
            Enter valid email
          </small>
        </div>

        <!-- PASSWORD -->
        <div class="input-group password-group">
          <input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Password"
            formControlName="password"
          />

          <!-- 🔥 ICON -->
          <span class="eye-icon" (click)="togglePassword()">
            <ion-icon [name]="showPassword ? 'eye-outline' : 'eye-off-outline'"></ion-icon>
          </span>

          <small *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
            Password must be at least 6 characters
          </small>
        </div>

        <div class="options">
          <label> <input type="checkbox" /> Remember me </label>
          <span class="forgot">Forgot password?</span>
        </div>
        <!-- BUTTON (BOTTOM) -->
        <button type="submit">LOGIN</button>
      </form>
      <p class="social-text">Sign in with</p>

      <div class="social-icons">
        <ion-icon name="logo-facebook"></ion-icon>
        <ion-icon name="logo-twitter"></ion-icon>
        <ion-icon name="logo-google"></ion-icon>
        <ion-icon name="logo-linkedin"></ion-icon>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="content">
      <img src="assets/logo.png" class="logo" />

      <h2>Glad to see you!</h2>

      <p>Welcome to Proclink chatbot. Login to continue.</p>
    </div>
  </div>
</div>
