<div class="user-page">
  <!--  Top Bar -->
  <div class="top-bar">
    <button class="create-btn" (click)="openModal()">Create User</button>
  </div>

  <!--  Table -->
  <table class="user-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Email</th>
        <th>Created At</th>
        <th>Created By</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let user of users">
        <td>{{ user.id }}</td>
        <td>{{ user.username }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.created_at }}</td>
        <td>{{ user.created_by }}</td>
        <td>
          <button class="delete-btn" (click)="deleteUser(user.id)">
            <!-- <ion-icon name="trash-outline"></ion-icon> -->
            Delete
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<!-- 🔥 OVERLAY -->
<div class="overlay" *ngIf="showModal" (click)="closeModal()"></div>

<!-- 🔥 MODAL -->
<div class="modal" *ngIf="showModal">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <!-- ❌ Close -->
    <span class="close" (click)="closeModal()">×</span>

    <h2>Create User</h2>

    <input type="text" placeholder="Username" [(ngModel)]="newUser.username" />
    <input type="email" placeholder="Email" [(ngModel)]="newUser.email" />
    <input type="password" placeholder="Password" [(ngModel)]="newUser.password" />

    <!-- 🔽 Role -->
    <select [(ngModel)]="newUser.role">
      <option value="user">User</option>
      <option value="admin">Admin</option>
    </select>
    <p class="error-msg" *ngIf="createErrorMessage">
      {{ createErrorMessage }}
    </p>

    <div class="modal-actions">
      <button (click)="closeModal()">Cancel</button>
      <button class="save" (click)="createUser()" [disabled]="isCreating">
        {{ isCreating ? 'Creating...' : 'Create' }}
      </button>
    </div>
  </div>
</div>
<!-- 🔥 DELETE CONFIRM OVERLAY -->
<div class="overlay" *ngIf="showDeleteConfirm"></div>

<!-- 🔥 DELETE CONFIRM MODAL -->
<div class="modal" *ngIf="showDeleteConfirm">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <!--  Close icon -->
    <span class="close" (click)="cancelDelete()">×</span>

    <h3>Confirm Delete</h3>

    <p>Are you sure you want to delete this user?</p>

    <!-- ERROR MESSAGE -->
    <p class="error-msg" *ngIf="deleteErrorMessage">
      {{ deleteErrorMessage }}
    </p>

    <div class="modal-actions">
      <button class="cancel-btn" (click)="cancelDelete()">Cancel</button>
      <button class="delete-btn" (click)="confirmDelete()" [disabled]="isDeleting">
        {{ isDeleting ? 'Deleting...' : 'Delete' }}
      </button>
    </div>
  </div>
</div>
